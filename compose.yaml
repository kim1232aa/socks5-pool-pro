name: socks5-pool-pro

services:
  proxy-pool:
    build:
      context: .
      dockerfile: Dockerfile
    image: socks5-pool-pro:local
    container_name: socks5-pool-pro
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    ports:
      - "127.0.0.1:${SOCKS_PORT:-1080}:1080"
      - "127.0.0.1:${DASHBOARD_PORT:-8080}:8080"
    environment:
      SOCKS_USER: "${SOCKS_USER:-}"
      SOCKS_PASS: "${SOCKS_PASS:-}"
      ADMIN_USER: "${ADMIN_USER:-}"
      ADMIN_PASS: "${ADMIN_PASS:-}"
      GOMEMLIMIT: "${GOMEMLIMIT:-768MiB}"
      GOGC: "${GOGC:-100}"
    command:
      - /app/socks5-pool
      - -listen
      - 0.0.0.0:1080
      - -status
      - 0.0.0.0:8080
      - -trusted-management-proxy
      - 172.30.250.1
      - -data-dir
      - /app/data
      - -max-client-connections
      - "${MAX_CLIENT_CONNECTIONS:-512}"
      - -max-concurrent
      - "${MAX_CONCURRENT:-50}"
      - -max-candidates
      - "${MAX_CANDIDATES:-1500}"
      - -scrape-interval
      - "${SCRAPE_INTERVAL:-20m}"
      - -check-timeout
      - "${CHECK_TIMEOUT:-10s}"
      - -require-ip-change=${REQUIRE_IP_CHANGE:-true}
    volumes:
      - socks5-pool-data:/app/data
    networks:
      - socks5-pool
    read_only: true
    mem_limit: 1024m
    mem_reservation: 384m
    pids_limit: 512
    cpus: "2.0"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    tmpfs:
      - /tmp:size=16m,mode=1777,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - CAP_KILL
      - CAP_SYS_PTRACE
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  socks5-pool-data:
    name: socks5-pool-pro-data

networks:
  socks5-pool:
    name: socks5-pool-pro-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.250.0/24
          gateway: 172.30.250.1
